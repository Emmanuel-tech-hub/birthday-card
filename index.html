<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maison Éclat — Birthday Atelier</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ─── RESET ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:        #c9a84c;
  --gold-light:  #e8d5a3;
  --gold-dim:    #7a6230;
  --brown-deep:  #1a1005;
  --brown-mid:   #120d04;
  --text:        #e8e0d5;
  --muted:       #8a7a60;
  --font-serif:  'Cormorant Garamond', Georgia, serif;
  --font-script: 'Great Vibes', cursive;
  --font-sans:   'Montserrat', sans-serif;
  --ease-lux:    cubic-bezier(0.16, 1, 0.3, 1);
}

html {
  scroll-behavior: smooth;
}

body {
  width: 100%;
  min-height: 100vh;
  background: linear-gradient(160deg, #0a0700 0%, #1a1005 40%, #0e0b03 70%, #0a0700 100%);
  color: var(--text);
  font-family: var(--font-serif);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ─── GLOBAL BACKGROUND VIDEO ──────────────────────── */
#bg-video-wrap {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
}
#bg-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scale(1.05);
  filter: saturate(0.6) brightness(0.45);
  will-change: transform;
}
#bg-video-wrap::before {
  content: '';
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    135deg,
    rgba(10,7,0,0.78) 0%,
    rgba(20,14,3,0.55) 50%,
    rgba(10,7,0,0.78) 100%
  );
}
#bg-video-wrap::after {
  content: '';
  position: absolute; inset: 0; z-index: 2;
  background: radial-gradient(ellipse at 50% 25%, transparent 20%, rgba(0,0,0,0.7) 100%);
}

/* ─── PAGES ─────────────────────────────────────────── */
.page {
  position: relative; z-index: 10;
  width: 100%;
  min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 4rem 1.5rem 5rem;
  opacity: 0;
  transition: opacity 0.85s var(--ease-lux), transform 0.85s var(--ease-lux);
  pointer-events: none;
}
.page.active  { opacity: 1; pointer-events: all; }
.page.exit    { opacity: 0; transform: scale(0.97); }

/* ─── LOADING OVERLAY ───────────────────────────────── */
#loading-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: #0a0700;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1.2rem;
  opacity: 1;
  transition: opacity 1s ease;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loader-logo {
  font-family: var(--font-script);
  font-size: 3.2rem;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(201,168,76,0.5);
  animation: pulse 2s ease-in-out infinite;
}
.loader-line {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: expandLine 1.8s var(--ease-lux) forwards 0.3s;
}
@keyframes expandLine { to { width: 120px; } }
@keyframes pulse {
  0%,100% { opacity: 0.7; }
  50% { opacity: 1; text-shadow: 0 0 60px rgba(201,168,76,0.7); }
}

/* ─── LOGO / BRAND ──────────────────────────────────── */
.logo-mark {
  font-family: var(--font-script);
  font-size: clamp(2.8rem, 6vw, 4.4rem);
  color: var(--gold);
  letter-spacing: 0.03em;
  text-shadow: 0 0 50px rgba(201,168,76,0.4);
  line-height: 1;
  margin-bottom: 0.2rem;
}
.logo-rule {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0.7rem auto 1.6rem;
}
.atelier-label {
  font-family: var(--font-sans);
  font-size: clamp(0.5rem, 1.2vw, 0.65rem);
  font-weight: 300;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.8;
  margin-bottom: 1rem;
}

/* ─── LANDING TYPOGRAPHY ────────────────────────────── */
.main-title {
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  font-weight: 300;
  letter-spacing: 0.07em;
  text-align: center;
  color: var(--text);
  line-height: 1.2;
}
.main-title em { font-style: italic; color: var(--gold-light); }

.subtitle {
  margin-top: 1rem;
  font-size: clamp(0.88rem, 1.8vw, 1.08rem);
  font-style: italic;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-align: center;
}

/* ─── FORM ──────────────────────────────────────────── */
.form-wrap {
  margin-top: 3rem;
  width: 100%;
  max-width: 500px;
  display: flex; flex-direction: column; gap: 1.5rem;
}

.field { position: relative; }
.field label {
  display: block;
  font-family: var(--font-sans);
  font-size: 0.58rem;
  font-weight: 300;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 0.5rem;
  padding-left: 2px;
}
.field input,
.field textarea {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: none;
  border-bottom: 1px solid rgba(201,168,76,0.22);
  padding: 0.75rem 0.2rem;
  font-family: var(--font-serif);
  font-size: clamp(0.95rem, 2vw, 1.05rem);
  font-weight: 300;
  color: var(--text);
  outline: none;
  transition: border-color 0.4s, box-shadow 0.4s;
  resize: none;
  caret-color: var(--gold);
}
.field input::placeholder,
.field textarea::placeholder { color: rgba(232,224,213,0.2); }
.field input:focus,
.field textarea:focus {
  border-bottom-color: var(--gold);
  box-shadow: 0 3px 20px -6px rgba(201,168,76,0.2);
}
.field textarea { min-height: 90px; }
.field::after {
  content: '';
  position: absolute; bottom: 0; left: 0;
  width: 0; height: 1px;
  background: var(--gold);
  transition: width 0.5s var(--ease-lux);
}
.field:focus-within::after { width: 100%; }

/* ─── PHOTO UPLOAD FIELD ────────────────────────────── */
.upload-field {
  display: flex; align-items: center; gap: 1rem;
  cursor: pointer;
  padding: 0.75rem 1rem;
  border: 1px dashed rgba(201,168,76,0.25);
  transition: border-color 0.3s, background 0.3s;
}
.upload-field:hover {
  border-color: rgba(201,168,76,0.55);
  background: rgba(201,168,76,0.04);
}
.upload-field input[type="file"] { display: none; }
.upload-icon {
  font-size: 1.4rem;
  line-height: 1;
  opacity: 0.6;
}
.upload-text {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  font-weight: 300;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dim);
}
.upload-preview {
  width: 42px; height: 42px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid rgba(201,168,76,0.35);
  display: none;
  margin-left: auto;
  flex-shrink: 0;
}
.upload-preview.visible { display: block; }

/* ─── BUTTONS ───────────────────────────────────────── */
.btn-primary {
  padding: 1rem 2.8rem;
  font-family: var(--font-sans);
  font-size: 0.66rem;
  font-weight: 300;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: #0a0700;
  background: linear-gradient(135deg, #c9a84c 0%, #e8d5a3 50%, #c9a84c 100%);
  background-size: 200% 100%;
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background-position 0.6s, box-shadow 0.5s, transform 0.3s;
  align-self: center;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover {
  background-position: 100% 0;
  box-shadow: 0 4px 36px rgba(201,168,76,0.32), 0 0 60px rgba(201,168,76,0.08);
  transform: translateY(-2px);
}
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  padding: 0.9rem 2.2rem;
  font-family: var(--font-sans);
  font-size: 0.6rem;
  font-weight: 300;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  background: transparent;
  border: 1px solid rgba(201,168,76,0.3);
  cursor: pointer;
  transition: border-color 0.4s, box-shadow 0.4s, transform 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover {
  border-color: var(--gold);
  box-shadow: inset 0 0 20px rgba(201,168,76,0.06), 0 0 24px rgba(201,168,76,0.1);
  transform: translateY(-2px);
}

/* ─── REVEAL PAGE ───────────────────────────────────── */
#page-reveal {
  padding: 5rem 1.5rem 5rem;
  gap: 2.8rem;
}

/* ─── CERTIFICATE ───────────────────────────────────── */
.cert-outer {
  position: relative;
  width: 100%;
  max-width: 620px;
  box-shadow:
    0 2px 0 1px rgba(122,98,48,0.8),
    0 4px 0 2px rgba(90,72,32,0.6),
    0 6px 0 3px rgba(58,46,16,0.5),
    0 12px 50px -4px rgba(0,0,0,0.9),
    0 32px 90px -10px rgba(0,0,0,0.75);
  transform: perspective(1000px) rotateX(1.2deg);
  transition: transform 0.9s var(--ease-lux), box-shadow 0.9s var(--ease-lux);
  border-radius: 2px;
}
.cert-outer:hover {
  transform: perspective(1000px) rotateX(0deg) translateY(-5px);
  box-shadow:
    0 2px 0 1px rgba(122,98,48,0.8),
    0 4px 0 2px rgba(90,72,32,0.6),
    0 6px 0 3px rgba(58,46,16,0.5),
    0 20px 70px -4px rgba(0,0,0,0.95),
    0 45px 110px -10px rgba(0,0,0,0.8);
}

#cert-card {
  position: relative;
  /* glass effect — needs uploaded photo as --cert-bg */
  background: rgba(12, 9, 2, 0.72);
  backdrop-filter: blur(18px) saturate(1.2);
  -webkit-backdrop-filter: blur(18px) saturate(1.2);
  border: 1px solid rgba(201,168,76,0.28);
  padding: clamp(2.4rem, 7vw, 4.2rem) clamp(2rem, 5.5vw, 3.8rem);
  overflow: hidden;
  text-align: center;
  border-radius: 2px;
}

/* cert background image layer */
#cert-bg-layer {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  filter: blur(22px) brightness(0.35) saturate(0.7);
  transform: scale(1.08);
  opacity: 0;
  transition: opacity 1.2s var(--ease-lux);
  z-index: 0;
}
#cert-bg-layer.visible { opacity: 1; }

/* soft gradient overlay over photo */
#cert-bg-layer::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    160deg,
    rgba(20,14,3,0.55) 0%,
    rgba(10,8,2,0.35) 50%,
    rgba(20,14,3,0.55) 100%
  );
}

/* all cert text above bg */
#cert-card > *:not(#cert-bg-layer) { position: relative; z-index: 1; }

/* ambient light sweep */
#cert-card::before {
  content: '';
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(
    115deg,
    transparent 25%,
    rgba(201,168,76,0.06) 50%,
    transparent 75%
  );
  pointer-events: none;
}

/* corner ornaments */
.cert-corner {
  position: absolute;
  width: 40px; height: 40px;
  opacity: 0.45;
  z-index: 2;
}
.cert-corner svg { width: 100%; height: 100%; }
.cert-corner.tl { top: 14px; left: 14px; }
.cert-corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
.cert-corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
.cert-corner.br { bottom: 14px; right: 14px; transform: scale(-1); }

/* inner frame */
.cert-frame {
  position: absolute; inset: 22px;
  border: 1px solid rgba(201,168,76,0.1);
  pointer-events: none;
  z-index: 2;
  border-radius: 1px;
}

/* cert typography */
.cert-header-label {
  font-family: var(--font-sans);
  font-size: clamp(0.46rem, 1vw, 0.58rem);
  font-weight: 300;
  letter-spacing: 0.48em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.65;
  margin-bottom: 0.4rem;
}
.cert-divider {
  display: flex; align-items: center; gap: 0.8rem;
  margin: 0.5rem auto 1.1rem;
  max-width: 240px;
}
.cert-divider span {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.38), transparent);
}
.cert-diamond {
  width: 5px; height: 5px;
  background: var(--gold);
  transform: rotate(45deg);
  opacity: 0.65;
  flex-shrink: 0;
}
.cert-presented-to {
  font-family: var(--font-serif);
  font-size: clamp(0.7rem, 1.5vw, 0.84rem);
  font-style: italic;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.09em;
  margin-bottom: 0.4rem;
}
.cert-name {
  font-family: var(--font-script);
  font-size: clamp(2.4rem, 7.5vw, 4rem);
  color: var(--gold-light);
  text-shadow:
    0 0 50px rgba(201,168,76,0.35),
    0 2px 16px rgba(0,0,0,0.9);
  line-height: 1.15;
  margin-bottom: 0.25rem;
}
.cert-tagline {
  font-family: var(--font-serif);
  font-size: clamp(0.76rem, 1.6vw, 0.9rem);
  font-style: italic;
  font-weight: 300;
  color: rgba(232,224,213,0.42);
  letter-spacing: 0.04em;
  margin: 0.5rem 0 1.5rem;
  line-height: 1.65;
}
.cert-message-wrap {
  position: relative;
  margin: 0 auto 1.6rem;
  max-width: 84%;
  padding: 1.1rem 1.4rem 1rem;
  background: rgba(201,168,76,0.05);
  border-left: 2px solid rgba(201,168,76,0.28);
}
.cert-quote-mark {
  position: absolute;
  top: -0.6rem; left: 0.8rem;
  font-family: var(--font-serif);
  font-size: 3.2rem;
  color: rgba(201,168,76,0.22);
  line-height: 1;
}
.cert-message {
  font-family: var(--font-serif);
  font-size: clamp(0.88rem, 1.8vw, 1rem);
  font-style: italic;
  font-weight: 300;
  color: rgba(232,224,213,0.78);
  line-height: 1.8;
  letter-spacing: 0.02em;
}

/* signature */
.cert-signed-label {
  font-family: var(--font-sans);
  font-size: clamp(0.46rem, 1vw, 0.56rem);
  font-weight: 300;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.25rem;
}
.cert-signature {
  font-family: var(--font-script);
  font-size: clamp(1.6rem, 4.5vw, 2.4rem);
  color: var(--gold);
  text-shadow: 0 0 24px rgba(201,168,76,0.22);
  line-height: 1.2;
}

/* ─── SEAL — minimal embossed ring ─────────────────── */
.cert-seal {
  display: inline-flex; align-items: center; justify-content: center;
  width: clamp(64px, 11vw, 82px);
  height: clamp(64px, 11vw, 82px);
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.38);
  box-shadow:
    0 0 0 4px rgba(201,168,76,0.05),
    0 0 0 8px rgba(201,168,76,0.03),
    0 0 22px rgba(201,168,76,0.12),
    inset 0 0 14px rgba(201,168,76,0.05);
  margin-top: 1.6rem;
  position: relative;
}
.cert-seal::before {
  content: '';
  position: absolute; inset: 7px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.18);
}
.cert-seal::after {
  content: '';
  position: absolute; inset: 14px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.08);
}

/* watermark */
.cert-watermark {
  margin-top: 1.8rem;
  font-family: var(--font-sans);
  font-size: 0.48rem;
  letter-spacing: 0.48em;
  text-transform: uppercase;
  color: rgba(201,168,76,0.18);
}

/* ─── ACTIONS ───────────────────────────────────────── */
.reveal-actions {
  display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
  width: 100%; max-width: 620px;
}

/* ─── TOAST ─────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(20,14,3,0.9);
  border: 1px solid rgba(201,168,76,0.35);
  color: var(--gold-light);
  font-family: var(--font-sans);
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 0.75rem 1.8rem;
  z-index: 400;
  opacity: 0;
  transition: opacity 0.4s ease, transform 0.4s var(--ease-lux);
  pointer-events: none;
  white-space: nowrap;
  backdrop-filter: blur(8px);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── PARTICLES ─────────────────────────────────────── */
.shimmer-particle {
  position: fixed; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.55), transparent 65%);
  pointer-events: none; z-index: 5;
  animation: floatUp linear infinite;
  opacity: 0;
}
@keyframes floatUp {
  0%   { opacity: 0; transform: translateY(0) scale(0.4); }
  15%  { opacity: 0.35; }
  85%  { opacity: 0.12; }
  100% { opacity: 0; transform: translateY(-65vh) scale(1.6); }
}

/* ─── MOBILE ─────────────────────────────────────────── */
@media (max-width: 600px) {
  .page { padding: 3.5rem 1.2rem 4.5rem; justify-content: flex-start; padding-top: 5rem; }
  #page-reveal { padding-top: 4rem; }
  .cert-outer { transform: none !important; }
  .cert-message-wrap { max-width: 100%; }
  .reveal-actions { flex-direction: column; align-items: stretch; }
  .reveal-actions .btn-primary,
  .reveal-actions .btn-secondary { align-self: stretch; text-align: center; padding: 1.1rem; }
  .btn-primary { align-self: stretch; text-align: center; }
}

@media (max-width: 380px) {
  .cert-name { font-size: 2rem; }
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="loader-logo">Maison Éclat</div>
  <div class="loader-line"></div>
</div>

<!-- BACKGROUND VIDEO -->
<div id="bg-video-wrap">
  <video id="bg-video" autoplay muted loop playsinline preload="none">
    <!--
      Drop your video file here:
      <source src="luxury-bg.mp4" type="video/mp4" />

      Free luxury videos (silk, champagne, gold bokeh):
        pexels.com  |  coverr.co  |  pixabay.com
      Recommended: "silk fabric slow motion" or "gold dust particles"
      Encode: MP4, H.264, ≤4 Mbps, 1080p, 30fps
    -->
  </video>
</div>

<!-- PARTICLES -->
<div id="particles"></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ═══ PAGE 1 — LANDING ══════════════════════════════ -->
<section id="page-landing" class="page">
  <div class="atelier-label" id="lbl-atelier">Birthday Atelier</div>
  <div class="logo-mark">Maison Éclat</div>
  <div class="logo-rule"></div>

  <h1 class="main-title">
    <em id="title-em">Birthday</em> Atelier
  </h1>
  <p class="subtitle" id="subtitle">Craft a timeless birthday experience</p>

  <form class="form-wrap" id="form" novalidate>

    <!-- Photo upload -->
    <div class="field">
      <label id="lbl-photo">Celebrant's Photo <span style="opacity:0.5;font-size:0.9em">(optional)</span></label>
      <label class="upload-field" for="input-photo">
        <span class="upload-icon">🖼</span>
        <span class="upload-text" id="upload-text">Upload a photo</span>
        <img class="upload-preview" id="upload-preview" alt="" />
        <input type="file" id="input-photo" accept="image/*" />
      </label>
    </div>

    <div class="field">
      <label id="lbl-celebrant">Celebrant's Name</label>
      <input type="text" id="input-celebrant" autocomplete="off" placeholder="e.g. Isabelle" required />
    </div>

    <div class="field">
      <label id="lbl-from">Your Name</label>
      <input type="text" id="input-from" autocomplete="off" placeholder="e.g. Julien" required />
    </div>

    <div class="field">
      <label id="lbl-message">Your Message</label>
      <textarea id="input-message" placeholder="Write something heartfelt…" required></textarea>
    </div>

    <button type="submit" class="btn-primary" id="btn-create">Create the Moment</button>
  </form>
</section>

<!-- ═══ PAGE 2 — REVEAL ═══════════════════════════════ -->
<section id="page-reveal" class="page">

  <div class="cert-outer">
    <div id="cert-card">

      <!-- photo background layer -->
      <div id="cert-bg-layer"></div>

      <!-- corners -->
      <div class="cert-corner tl">
        <svg viewBox="0 0 40 40" fill="none">
          <path d="M2 38V8C2 4.69 4.69 2 8 2H38" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>
          <path d="M2 20V2H20" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
        </svg>
      </div>
      <div class="cert-corner tr">
        <svg viewBox="0 0 40 40" fill="none"><path d="M2 38V8C2 4.69 4.69 2 8 2H38" stroke="#c9a84c" stroke-width="1" opacity="0.6"/><path d="M2 20V2H20" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/></svg>
      </div>
      <div class="cert-corner bl">
        <svg viewBox="0 0 40 40" fill="none"><path d="M2 38V8C2 4.69 4.69 2 8 2H38" stroke="#c9a84c" stroke-width="1" opacity="0.6"/><path d="M2 20V2H20" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/></svg>
      </div>
      <div class="cert-corner br">
        <svg viewBox="0 0 40 40" fill="none"><path d="M2 38V8C2 4.69 4.69 2 8 2H38" stroke="#c9a84c" stroke-width="1" opacity="0.6"/><path d="M2 20V2H20" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/></svg>
      </div>

      <div class="cert-frame"></div>

      <div class="cert-header-label" id="cert-header-lbl">Certificate of Appreciation</div>

      <div class="cert-divider">
        <span></span><div class="cert-diamond"></div><span></span>
      </div>

      <div class="cert-presented-to" id="cert-presented-lbl">Presented to</div>
      <div class="cert-name" id="cert-name">—</div>

      <div class="cert-tagline" id="cert-tagline">
        For celebrating another beautiful year of life,<br/>and for being truly exceptional.
      </div>

      <div class="cert-message-wrap">
        <span class="cert-quote-mark">"</span>
        <p class="cert-message" id="cert-message">Your message here…</p>
      </div>

      <div class="cert-divider" style="margin-top:1.5rem;">
        <span></span><div class="cert-diamond"></div><span></span>
      </div>

      <div class="cert-signed-label" id="cert-signed-lbl">Presented by</div>
      <div class="cert-signature" id="cert-signature">—</div>

      <!-- minimal seal: pure CSS rings, no text -->
      <div class="cert-seal"></div>

      <div class="cert-watermark">Maison Éclat — Birthday Atelier</div>
    </div>
  </div>

  <div class="reveal-actions">
    <button class="btn-primary" id="btn-share">Share this Moment 💫</button>
    <button class="btn-secondary" id="btn-back">← Create Another</button>
  </div>
</section>

<!-- ═══ JAVASCRIPT ═══════════════════════════════════ -->
<script>
/* ── Language ───────────────────────────────────────── */
const lang = navigator.language?.startsWith('fr') ? 'fr' : 'en';

const T = {
  en: {
    atelierLabel:    'Birthday Atelier',
    titleEm:         'Birthday',
    subtitle:        'Craft a timeless birthday experience',
    lblPhoto:        'Celebrant\'s Photo',
    uploadText:      'Upload a photo',
    uploadDone:      'Photo selected ✓',
    lblCelebrant:    "Celebrant's Name",
    lblFrom:         'Your Name',
    lblMessage:      'Your Message',
    placeholderCel:  'e.g. Isabelle',
    placeholderFrom: 'e.g. Julien',
    placeholderMsg:  'Write something heartfelt…',
    btnCreate:       'Create the Moment',
    btnShare:        'Share this Moment 💫',
    btnBack:         '← Create Another',
    certHeader:      'Certificate of Appreciation',
    certPresented:   'Presented to',
    certTagline:     'For celebrating another beautiful year of life,\nand for being truly exceptional.',
    certSigned:      'Presented by',
    shareMsg:        'I created something truly special for you 💖',
    toastOpening:    'Opening WhatsApp…',
    errorFill:       'Please fill in all fields',
    pageTitle:       'Maison Éclat — Birthday Atelier',
  },
  fr: {
    atelierLabel:    "Atelier d'Anniversaire",
    titleEm:         'Anniversaire',
    subtitle:        "Créez une expérience d'anniversaire inoubliable",
    lblPhoto:        'Photo du Festoyé(e)',
    uploadText:      'Télécharger une photo',
    uploadDone:      'Photo sélectionnée ✓',
    lblCelebrant:    'Nom du Festoyé(e)',
    lblFrom:         'Votre Nom',
    lblMessage:      'Votre Message',
    placeholderCel:  'ex. Isabelle',
    placeholderFrom: 'ex. Julien',
    placeholderMsg:  'Écrivez quelque chose du fond du cœur…',
    btnCreate:       'Créer le moment',
    btnShare:        'Partager ce moment 💫',
    btnBack:         '← Créer un autre',
    certHeader:      "Certificat d'Appréciation",
    certPresented:   'Présenté à',
    certTagline:     "Pour célébrer une nouvelle et belle année de vie,\net pour être véritablement exceptionnel(le).",
    certSigned:      'Présenté par',
    shareMsg:        "J'ai créé quelque chose de vraiment spécial pour toi 💖",
    toastOpening:    'Ouverture de WhatsApp…',
    errorFill:       'Veuillez remplir tous les champs',
    pageTitle:       "Maison Éclat — Atelier d'Anniversaire",
  }
};
const t = T[lang];

/* ── Apply translations ─────────────────────────────── */
document.title = t.pageTitle;
document.getElementById('lbl-atelier').textContent        = t.atelierLabel;
document.getElementById('title-em').textContent           = t.titleEm;
document.getElementById('subtitle').textContent           = t.subtitle;
document.getElementById('lbl-photo').childNodes[0].textContent = t.lblPhoto + ' ';
document.getElementById('upload-text').textContent        = t.uploadText;
document.getElementById('lbl-celebrant').textContent      = t.lblCelebrant;
document.getElementById('lbl-from').textContent           = t.lblFrom;
document.getElementById('lbl-message').textContent        = t.lblMessage;
document.getElementById('input-celebrant').placeholder    = t.placeholderCel;
document.getElementById('input-from').placeholder         = t.placeholderFrom;
document.getElementById('input-message').placeholder      = t.placeholderMsg;
document.getElementById('btn-create').textContent         = t.btnCreate;
document.getElementById('btn-share').textContent          = t.btnShare;
document.getElementById('btn-back').textContent           = t.btnBack;
document.getElementById('cert-header-lbl').textContent    = t.certHeader;
document.getElementById('cert-presented-lbl').textContent = t.certPresented;
document.getElementById('cert-signed-lbl').textContent    = t.certSigned;

/* ── Pages ──────────────────────────────────────────── */
const pageLanding = document.getElementById('page-landing');
const pageReveal  = document.getElementById('page-reveal');

function showPage(el) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.classList.add('exit');
    setTimeout(() => p.classList.remove('exit'), 900);
  });
  setTimeout(() => el.classList.add('active'), 80);
}

/* ── Loading screen ─────────────────────────────────── */
window.addEventListener('load', () => {
  const ol = document.getElementById('loading-overlay');
  setTimeout(() => {
    ol.classList.add('hidden');
    setTimeout(() => { ol.style.display = 'none'; showPage(pageLanding); }, 980);
  }, 1500);
});

/* ── Particles ──────────────────────────────────────── */
(function() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'shimmer-particle';
    const s = 2 + Math.random() * 4;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}vw;bottom:${-8+Math.random()*8}vh;animation-duration:${10+Math.random()*20}s;animation-delay:${Math.random()*14}s;`;
    c.appendChild(p);
  }
})();

/* ── Photo upload ───────────────────────────────────── */
let uploadedDataUrl = null;

document.getElementById('input-photo').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    uploadedDataUrl = e.target.result;
    const preview = document.getElementById('upload-preview');
    preview.src = uploadedDataUrl;
    preview.classList.add('visible');
    document.getElementById('upload-text').textContent = t.uploadDone;
  };
  reader.readAsDataURL(file);
});

/* ── Form submit ────────────────────────────────────── */
document.getElementById('form').addEventListener('submit', function(e) {
  e.preventDefault();

  const celebrant = document.getElementById('input-celebrant').value.trim();
  const from      = document.getElementById('input-from').value.trim();
  const message   = document.getElementById('input-message').value.trim();

  if (!celebrant || !from || !message) {
    showToast(t.errorFill);
    return;
  }

  /* populate cert */
  document.getElementById('cert-name').textContent      = celebrant;
  document.getElementById('cert-signature').textContent = from;
  document.getElementById('cert-message').textContent   = message;

  const lines = t.certTagline.split('\n');
  document.getElementById('cert-tagline').innerHTML = lines.join('<br/>');

  /* apply photo to cert background */
  const bgLayer = document.getElementById('cert-bg-layer');
  if (uploadedDataUrl) {
    bgLayer.style.backgroundImage = `url(${uploadedDataUrl})`;
    bgLayer.classList.add('visible');
  } else {
    bgLayer.classList.remove('visible');
    bgLayer.style.backgroundImage = '';
  }

  showPage(pageReveal);
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

/* ── Back button ────────────────────────────────────── */
document.getElementById('btn-back').addEventListener('click', () => {
  showPage(pageLanding);
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

/* ── Share ──────────────────────────────────────────── */
document.getElementById('btn-share').addEventListener('click', async () => {
  showToast(t.toastOpening);

  try {
    const card = document.getElementById('cert-card');
    const canvas = await html2canvas(card, {
      backgroundColor: '#0d0900',
      scale: 2,
      useCORS: true,
      logging: false,
      allowTaint: true,
    });

    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'maison-eclat-birthday.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ title: 'Maison Éclat', text: t.shareMsg, files: [file] });
          return;
        } catch(_) {}
      }

      /* WhatsApp fallback */
      window.open(`https://wa.me/?text=${encodeURIComponent(t.shareMsg + '\n\n' + window.location.href)}`, '_blank');
    }, 'image/png');

  } catch(err) {
    window.open(`https://wa.me/?text=${encodeURIComponent(t.shareMsg)}`, '_blank');
  }
});

/* ── Toast ──────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ── Card tilt (desktop only) ───────────────────────── */
const certOuter = document.querySelector('.cert-outer');
document.addEventListener('mousemove', (e) => {
  if (window.innerWidth < 600 || !pageReveal.classList.contains('active')) return;
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx;
  const dy = (e.clientY - cy) / cy;
  certOuter.style.transform = `perspective(1000px) rotateX(${-dy * 3.5}deg) rotateY(${dx * 3.5}deg)`;
});
document.addEventListener('mouseleave', () => {
  certOuter.style.transform = 'perspective(1000px) rotateX(1.2deg) rotateY(0deg)';
});
</script>
</body>
</html>
