<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CARDTO</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ── RESET ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:     #c9a84c;
  --gold-lt:  #e8d5a3;
  --gold-dim: #7a6230;
  --text:     #e8e0d5;
  --muted:    #8a7a60;
  --serif:    'Cormorant Garamond', Georgia, serif;
  --script:   'Great Vibes', cursive;
  --sans:     'Montserrat', sans-serif;
  --ease:     cubic-bezier(0.16, 1, 0.3, 1);
}

html { scroll-behavior: smooth; }

body {
  width: 100%; min-height: 100vh;
  background: linear-gradient(160deg, #0d0900 0%, #1c1206 40%, #0d0900 100%);
  color: var(--text);
  font-family: var(--serif);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── VIDEO BG ───────────────────────────────── */
#bg-wrap { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
#bg-video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; transform: scale(1.06);
  filter: saturate(0.5) brightness(0.35); will-change: transform;
}
#bg-wrap::before {
  content: ''; position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(135deg, rgba(13,9,0,.82) 0%, rgba(22,15,4,.58) 50%, rgba(13,9,0,.82) 100%);
}
#bg-wrap::after {
  content: ''; position: absolute; inset: 0; z-index: 2;
  background: radial-gradient(ellipse at 50% 20%, transparent 18%, rgba(0,0,0,.68) 100%);
}

/* ── PAGES ──────────────────────────────────── */
.page {
  position: relative; z-index: 10;
  width: 100%; min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 4rem 1.5rem 5rem;
  opacity: 0;
  transition: opacity .85s var(--ease), transform .85s var(--ease);
  pointer-events: none;
}
.page.active  { opacity: 1; pointer-events: all; }
.page.exit    { opacity: 0; transform: scale(.97); }

/* ── LOADING ────────────────────────────────── */
#loading {
  position: fixed; inset: 0; z-index: 500;
  background: #0d0900;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1.2rem;
  opacity: 1; transition: opacity .9s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.ld-logo {
  font-family: var(--script); font-size: 3rem; color: var(--gold);
  text-shadow: 0 0 50px rgba(201,168,76,.5);
  animation: breathe 2.2s ease-in-out infinite;
}
.ld-line {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: grow 1.8s var(--ease) forwards .3s;
}
@keyframes grow { to { width: 110px; } }
@keyframes breathe { 0%,100% { opacity:.65; } 50% { opacity:1; text-shadow:0 0 70px rgba(201,168,76,.7); } }

/* ── LANDING TYPOGRAPHY ─────────────────────── */
.atelier-label {
  font-family: var(--sans); font-weight: 300;
  font-size: clamp(.5rem,1.2vw,.64rem); letter-spacing: .4em;
  text-transform: uppercase; color: var(--gold); opacity: .8; margin-bottom: .9rem;
}
.logo-mark {
  font-family: var(--script); font-size: clamp(2.8rem,6vw,4.4rem);
  color: var(--gold); line-height: 1;
  text-shadow: 0 0 55px rgba(201,168,76,.42); margin-bottom: .15rem;
}
.logo-rule {
  width: 58px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: .65rem auto 1.6rem;
}
.main-title {
  font-size: clamp(1.9rem,5vw,3.4rem); font-weight: 300;
  letter-spacing: .07em; text-align: center; color: var(--text); line-height: 1.2;
}
.main-title em { font-style: italic; color: var(--gold-lt); }
.subtitle {
  margin-top: .9rem; font-size: clamp(.86rem,1.8vw,1.06rem);
  font-style: italic; font-weight: 300;
  color: var(--muted); letter-spacing: .05em; text-align: center;
}

/* ── FORM ───────────────────────────────────── */
.form-wrap {
  margin-top: 2.8rem; width: 100%; max-width: 490px;
  display: flex; flex-direction: column; gap: 1.45rem;
}
.field { position: relative; }
.field label {
  display: block; font-family: var(--sans); font-size: .57rem;
  font-weight: 300; letter-spacing: .3em; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: .48rem; padding-left: 2px;
}
.field input, .field textarea {
  width: 100%; background: rgba(255,255,255,.03);
  border: none; border-bottom: 1px solid rgba(201,168,76,.22);
  padding: .72rem .18rem; font-family: var(--serif);
  font-size: clamp(.95rem,2vw,1.04rem); font-weight: 300;
  color: var(--text); outline: none;
  transition: border-color .4s, box-shadow .4s;
  resize: none; caret-color: var(--gold);
}
.field input::placeholder, .field textarea::placeholder { color: rgba(232,224,213,.2); }
.field input:focus, .field textarea:focus {
  border-bottom-color: var(--gold);
  box-shadow: 0 3px 20px -6px rgba(201,168,76,.2);
}
.field textarea { min-height: 86px; }
.field::after {
  content: ''; position: absolute; bottom: 0; left: 0;
  width: 0; height: 1px; background: var(--gold);
  transition: width .5s var(--ease);
}
.field:focus-within::after { width: 100%; }

/* upload */
.upload-field {
  display: flex; align-items: center; gap: .9rem;
  cursor: pointer; padding: .7rem 1rem;
  border: 1px dashed rgba(201,168,76,.24);
  transition: border-color .3s, background .3s;
}
.upload-field:hover { border-color: rgba(201,168,76,.5); background: rgba(201,168,76,.04); }
.upload-field input[type="file"] { display: none; }
.upload-icon { font-size: 1.3rem; opacity: .55; line-height: 1; }
.upload-text {
  font-family: var(--sans); font-size: .59rem; font-weight: 300;
  letter-spacing: .22em; text-transform: uppercase; color: var(--gold-dim);
}
.upload-preview {
  width: 40px; height: 40px; border-radius: 50%;
  object-fit: cover; border: 1px solid rgba(201,168,76,.35);
  display: none; margin-left: auto; flex-shrink: 0;
}
.upload-preview.visible { display: block; }

/* buttons */
.btn-primary {
  padding: 1rem 2.8rem; font-family: var(--sans); font-size: .65rem;
  font-weight: 300; letter-spacing: .32em; text-transform: uppercase;
  color: #0a0700;
  background: linear-gradient(135deg, #c9a84c 0%, #e8d5a3 50%, #c9a84c 100%);
  background-size: 200% 100%; border: none; cursor: pointer;
  transition: background-position .6s, box-shadow .5s, transform .3s;
  align-self: center; -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover {
  background-position: 100% 0;
  box-shadow: 0 4px 36px rgba(201,168,76,.3), 0 0 60px rgba(201,168,76,.07);
  transform: translateY(-2px);
}
.btn-primary:active { transform: translateY(0); }
.btn-secondary {
  padding: .9rem 2.2rem; font-family: var(--sans); font-size: .6rem;
  font-weight: 300; letter-spacing: .3em; text-transform: uppercase;
  color: var(--gold); background: transparent;
  border: 1px solid rgba(201,168,76,.3); cursor: pointer;
  transition: border-color .4s, box-shadow .4s, transform .3s;
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover {
  border-color: var(--gold);
  box-shadow: inset 0 0 20px rgba(201,168,76,.06), 0 0 24px rgba(201,168,76,.1);
  transform: translateY(-2px);
}

/* ── REVEAL PAGE ────────────────────────────── */
#page-reveal {
  padding: 4.5rem 1.2rem 5rem; gap: 2.4rem; justify-content: flex-start;
}

/* ═══════════════════════════════════════════════════
   CARD WRAPPER (holds any design)
═══════════════════════════════════════════════════ */
.card-wrap {
  width: 100%; max-width: 640px;
  transition: transform .9s var(--ease), box-shadow .9s var(--ease);
}

/* ── PASSPORT PHOTO (shared across all designs) ── */
.passport {
  position: absolute;
  top: 22px; right: 22px;
  width: clamp(64px, 13%, 84px);
  height: clamp(80px, 16%, 104px);
  z-index: 10;
  border: 2px solid rgba(201,168,76,.7);
  box-shadow: 0 2px 16px rgba(0,0,0,.6), 0 0 0 1px rgba(201,168,76,.25);
  overflow: hidden;
  display: none;
}
.passport.visible { display: block; }
.passport img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}

/* ── SHARED CARD TEXT STYLES ───────────────────── */
.c-eyebrow {
  font-family: var(--sans); font-size: clamp(.44rem,.9vw,.56rem);
  font-weight: 300; letter-spacing: .5em; text-transform: uppercase;
}
.c-title {
  font-family: var(--script); font-size: clamp(1.9rem,5.5vw,3rem);
  line-height: 1.1;
}
.c-rule {
  height: 1px; width: 100%;
  background: linear-gradient(90deg, transparent, currentColor, transparent);
  opacity: .35; margin: .7rem 0;
}
.c-rule-row {
  display: flex; align-items: center; gap: .7rem;
  margin: .55rem auto; max-width: 260px;
}
.c-rule-row span { flex:1; height:1px; background: linear-gradient(90deg,transparent,currentColor,transparent); opacity:.35; }
.c-diamond { width:5px; height:5px; transform:rotate(45deg); opacity:.6; flex-shrink:0; }
.c-presented {
  font-family: var(--serif); font-style: italic; font-weight: 300;
  font-size: clamp(.68rem,1.4vw,.8rem); letter-spacing: .08em;
}
.c-name {
  font-family: var(--script); font-size: clamp(1.7rem,5vw,2.6rem); line-height: 1.2;
}
.c-tagline {
  font-family: var(--serif); font-style: italic; font-weight: 300;
  font-size: clamp(.72rem,1.5vw,.86rem); line-height: 1.65;
  letter-spacing: .03em; opacity: .55;
}
.c-msg-wrap {
  position: relative; padding: .95rem 1.3rem .85rem;
  margin: 0 auto 1.3rem; max-width: 86%;
}
.c-msg-q {
  position: absolute; top: -.5rem; left: .7rem;
  font-family: var(--serif); font-size: 2.6rem; line-height: 1; opacity: .22;
}
.c-msg {
  font-family: var(--serif); font-size: clamp(.85rem,1.8vw,.97rem);
  font-style: italic; font-weight: 300;
  line-height: 1.78; letter-spacing: .02em;
}
.c-sig-label {
  font-family: var(--sans); font-size: clamp(.43rem,.9vw,.53rem);
  font-weight: 300; letter-spacing: .4em; text-transform: uppercase;
}
.c-sig {
  font-family: var(--script); font-size: clamp(1.4rem,4vw,2rem); line-height: 1.2;
}
.c-watermark {
  font-family: var(--sans); font-size: .44rem;
  letter-spacing: .5em; text-transform: uppercase; opacity: .15;
  margin-top: 1.4rem;
}

/* ── SEAL (shared) ──────────────────────────── */
.c-seal {
  display: inline-flex; align-items: center; justify-content: center;
  width: clamp(56px,10vw,72px); height: clamp(56px,10vw,72px);
  border-radius: 50%; margin-top: 1.3rem; position: relative;
}
.c-seal::before {
  content: ''; position: absolute; inset: 7px; border-radius: 50%;
}
.c-seal::after {
  content: ''; position: absolute; inset: 14px; border-radius: 50%;
}

/* ══════════════════════════════════════════════
   DESIGN 1 — DEEP NAVY (Heritage Society style)
══════════════════════════════════════════════ */
.design-1 {
  position: relative;
  background: #0e1628;
  border: 1px solid rgba(201,168,76,.4);
  padding: clamp(2.2rem,6vw,3.8rem) clamp(1.8rem,5vw,3.4rem);
  text-align: center;
  box-shadow:
    0 2px 0 1px rgba(120,96,46,.65),
    0 4px 0 2px rgba(88,70,30,.45),
    0 10px 50px -4px rgba(0,0,0,.9),
    0 30px 90px -10px rgba(0,0,0,.75);
  overflow: hidden;
  transform: perspective(1000px) rotateX(1deg);
  transition: transform .9s var(--ease), box-shadow .9s var(--ease);
}
.design-1:hover {
  transform: perspective(1000px) rotateX(0deg) translateY(-4px);
}
/* gold wave sweep decorations */
.design-1::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 100%; height: 6px;
  background: linear-gradient(90deg, transparent 0%, #c9a84c 30%, #e8d5a3 50%, #c9a84c 70%, transparent 100%);
}
.design-1::after {
  content: '';
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 6px;
  background: linear-gradient(90deg, transparent 0%, #c9a84c 30%, #e8d5a3 50%, #c9a84c 70%, transparent 100%);
}
/* inner frame */
.d1-frame {
  position: absolute; inset: 18px;
  border: 1px solid rgba(201,168,76,.15); pointer-events: none;
}
/* left/right vertical gold bars */
.d1-bar-l, .d1-bar-r {
  position: absolute; top: 0; width: 5px; height: 100%;
  background: linear-gradient(180deg, transparent 0%, #c9a84c 20%, #e8d5a3 50%, #c9a84c 80%, transparent 100%);
  opacity: .35;
}
.d1-bar-l { left: 0; }
.d1-bar-r { right: 0; }
/* corner shield ornament */
.d1-shield-tl, .d1-shield-tr {
  position: absolute; top: 12px;
  width: 44px; height: 44px;
}
.d1-shield-tl { left: 14px; }
.d1-shield-tr { right: 14px; transform: scaleX(-1); }
/* celebration confetti dots */
.d1-confetti {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
}
.d1-dot {
  position: absolute; border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: .25; transform: scale(.8); }
  50% { opacity: .7; transform: scale(1.2); }
}
/* content z-index */
.design-1 > *:not(.d1-frame):not(.d1-bar-l):not(.d1-bar-r):not(.d1-shield-tl):not(.d1-shield-tr):not(.d1-confetti):not(.passport) {
  position: relative; z-index: 2;
}
.design-1 .c-eyebrow { color: var(--gold); }
.design-1 .c-title   { color: var(--gold-lt); text-shadow: 0 0 50px rgba(201,168,76,.35); }
.design-1 .c-rule-row span, .design-1 .c-rule { background: linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent); }
.design-1 .c-diamond { background: var(--gold); }
.design-1 .c-presented { color: rgba(232,224,213,.55); }
.design-1 .c-name { color: var(--gold-lt); text-shadow: 0 0 30px rgba(201,168,76,.3); }
.design-1 .c-tagline { color: rgba(232,224,213,.4); }
.design-1 .c-msg-wrap {
  background: rgba(201,168,76,.05);
  border-left: 1.5px solid rgba(201,168,76,.3);
}
.design-1 .c-msg-q { color: rgba(201,168,76,1); }
.design-1 .c-msg { color: rgba(232,224,213,.8); }
.design-1 .c-sig-label { color: var(--muted); }
.design-1 .c-sig { color: var(--gold); text-shadow: 0 0 20px rgba(201,168,76,.2); }
.design-1 .c-seal {
  border: 1px solid rgba(201,168,76,.4);
  box-shadow: 0 0 0 4px rgba(201,168,76,.05), 0 0 20px rgba(201,168,76,.12);
}
.design-1 .c-seal::before { border: 1px solid rgba(201,168,76,.18); }
.design-1 .c-seal::after  { border: 1px solid rgba(201,168,76,.08); }
.design-1 .c-watermark { color: rgba(201,168,76,.18); }

/* ══════════════════════════════════════════════
   DESIGN 2 — BLACK & GOLD WAVES (graduation style)
══════════════════════════════════════════════ */
.design-2 {
  position: relative;
  background: #080808;
  border: 1px solid rgba(201,168,76,.2);
  padding: clamp(2.2rem,6vw,3.8rem) clamp(1.8rem,5vw,3.4rem);
  text-align: center;
  overflow: hidden;
  box-shadow:
    0 2px 0 1px rgba(100,80,30,.6),
    0 4px 0 2px rgba(70,55,20,.4),
    0 10px 50px -4px rgba(0,0,0,.92),
    0 30px 90px -10px rgba(0,0,0,.8);
  transform: perspective(1000px) rotateX(1deg);
  transition: transform .9s var(--ease), box-shadow .9s var(--ease);
}
.design-2:hover { transform: perspective(1000px) rotateX(0deg) translateY(-4px); }

/* curved gold wave shapes */
.d2-wave-tl {
  position: absolute; top: -60px; left: -60px;
  width: 220px; height: 220px; border-radius: 50%;
  border: 18px solid transparent;
  border-right-color: #c9a84c;
  border-bottom-color: #c9a84c;
  transform: rotate(-30deg);
  opacity: .55;
}
.d2-wave-br {
  position: absolute; bottom: -60px; right: -60px;
  width: 220px; height: 220px; border-radius: 50%;
  border: 18px solid transparent;
  border-left-color: #c9a84c;
  border-top-color: #c9a84c;
  transform: rotate(-30deg);
  opacity: .55;
}
.d2-wave-tl2 {
  position: absolute; top: -30px; left: -30px;
  width: 160px; height: 160px; border-radius: 50%;
  border: 10px solid transparent;
  border-right-color: rgba(201,168,76,.4);
  border-bottom-color: rgba(201,168,76,.4);
  transform: rotate(-30deg);
}
.d2-wave-br2 {
  position: absolute; bottom: -30px; right: -30px;
  width: 160px; height: 160px; border-radius: 50%;
  border: 10px solid transparent;
  border-left-color: rgba(201,168,76,.4);
  border-top-color: rgba(201,168,76,.4);
  transform: rotate(-30deg);
}
/* subtle diagonal stripe texture */
.d2-stripe {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -55deg,
    transparent 0px, transparent 12px,
    rgba(201,168,76,.025) 12px, rgba(201,168,76,.025) 13px
  );
  pointer-events: none;
}
.design-2 > *:not(.d2-wave-tl):not(.d2-wave-br):not(.d2-wave-tl2):not(.d2-wave-br2):not(.d2-stripe):not(.passport) {
  position: relative; z-index: 2;
}
.design-2 .c-eyebrow { color: rgba(201,168,76,.75); letter-spacing: .55em; }
.design-2 .c-title { color: var(--gold-lt); text-shadow: 0 0 60px rgba(201,168,76,.4), 0 2px 20px rgba(0,0,0,.9); }
.design-2 .c-rule-row span { background: linear-gradient(90deg,transparent,rgba(201,168,76,.45),transparent); }
.design-2 .c-diamond { background: var(--gold); }
.design-2 .c-presented { color: rgba(232,224,213,.45); }
.design-2 .c-name { color: var(--gold-lt); text-shadow: 0 0 40px rgba(201,168,76,.3); }
.design-2 .c-tagline { color: rgba(232,224,213,.38); }
.design-2 .c-msg-wrap {
  background: rgba(201,168,76,.04);
  border-left: 2px solid rgba(201,168,76,.35);
}
.design-2 .c-msg-q { color: rgba(201,168,76,1); }
.design-2 .c-msg { color: rgba(232,224,213,.78); }
.design-2 .c-sig-label { color: rgba(201,168,76,.45); }
.design-2 .c-sig { color: var(--gold); text-shadow: 0 0 25px rgba(201,168,76,.25); }
.design-2 .c-seal {
  border: 1px solid rgba(201,168,76,.45);
  box-shadow: 0 0 0 4px rgba(201,168,76,.06), 0 0 22px rgba(201,168,76,.15);
}
.design-2 .c-seal::before { border: 1px solid rgba(201,168,76,.2); }
.design-2 .c-seal::after  { border: 1px solid rgba(201,168,76,.08); }
.design-2 .c-watermark { color: rgba(201,168,76,.15); }

/* ══════════════════════════════════════════════
   DESIGN 3 — BLACK + CELEBRATION (balloon energy)
══════════════════════════════════════════════ */
.design-3 {
  position: relative;
  background: linear-gradient(155deg, #0a0a0a 0%, #111108 50%, #0a0a0a 100%);
  border: 1px solid rgba(201,168,76,.3);
  padding: clamp(2.2rem,6vw,3.8rem) clamp(1.8rem,5vw,3.4rem);
  text-align: center;
  overflow: hidden;
  box-shadow:
    0 2px 0 1px rgba(110,88,36,.6),
    0 4px 0 2px rgba(80,64,26,.45),
    0 10px 50px -4px rgba(0,0,0,.9),
    0 30px 90px -10px rgba(0,0,0,.78);
  transform: perspective(1000px) rotateX(1deg);
  transition: transform .9s var(--ease), box-shadow .9s var(--ease);
}
.design-3:hover { transform: perspective(1000px) rotateX(0deg) translateY(-4px); }

/* top confetti burst */
.d3-top-burst {
  position: absolute; top: 0; left: 0; right: 0; height: 70px;
  background: linear-gradient(180deg,
    rgba(201,168,76,.07) 0%,
    transparent 100%);
  pointer-events: none;
}
/* scattered star dots */
.d3-star {
  position: absolute; opacity: .55;
  color: var(--gold); font-size: .9rem; line-height: 1;
  animation: starPulse 2.5s ease-in-out infinite;
}
@keyframes starPulse {
  0%,100% { opacity:.3; transform:scale(.85); }
  50% { opacity:.7; transform:scale(1.15); }
}
/* large decorative circles (balloon silhouette feel) */
.d3-circle {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(201,168,76,.12);
}
/* gold arc top-right */
.d3-arc {
  position: absolute; top: -50px; right: -50px;
  width: 180px; height: 180px; border-radius: 50%;
  border: 2px solid rgba(201,168,76,.2);
}
/* horizontal gold accent lines */
.d3-hline {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,.25) 20%, rgba(201,168,76,.35) 50%, rgba(201,168,76,.25) 80%, transparent 100%);
}
.design-3 > *:not(.d3-top-burst):not(.d3-star):not(.d3-circle):not(.d3-arc):not(.d3-hline):not(.passport) {
  position: relative; z-index: 2;
}
.design-3 .c-eyebrow { color: rgba(201,168,76,.8); }
.design-3 .c-title {
  color: var(--gold-lt);
  text-shadow: 0 0 50px rgba(201,168,76,.35), 0 2px 15px rgba(0,0,0,.9);
}
.design-3 .c-rule-row span { background: linear-gradient(90deg,transparent,rgba(201,168,76,.38),transparent); }
.design-3 .c-diamond { background: var(--gold); }
.design-3 .c-presented { color: rgba(232,224,213,.48); }
.design-3 .c-name {
  color: #fff;
  text-shadow: 0 0 30px rgba(255,255,255,.15), 0 0 60px rgba(201,168,76,.2);
}
.design-3 .c-tagline { color: rgba(232,224,213,.36); }
.design-3 .c-msg-wrap {
  background: rgba(201,168,76,.045);
  border-left: 1.5px solid rgba(201,168,76,.3);
}
.design-3 .c-msg-q { color: rgba(201,168,76,1); }
.design-3 .c-msg { color: rgba(232,224,213,.78); }
.design-3 .c-sig-label { color: rgba(201,168,76,.5); }
.design-3 .c-sig { color: var(--gold-lt); text-shadow: 0 0 22px rgba(201,168,76,.22); }
.design-3 .c-seal {
  border: 1px solid rgba(201,168,76,.42);
  box-shadow: 0 0 0 4px rgba(201,168,76,.05), 0 0 22px rgba(201,168,76,.14);
}
.design-3 .c-seal::before { border: 1px solid rgba(201,168,76,.18); }
.design-3 .c-seal::after  { border: 1px solid rgba(201,168,76,.07); }
.design-3 .c-watermark { color: rgba(201,168,76,.14); }

/* ── REVEAL ACTIONS ─────────────────────────── */
.reveal-actions {
  display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
  width: 100%; max-width: 640px;
}

/* ── TOAST ──────────────────────────────────── */
#toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: rgba(18,12,2,.92); border: 1px solid rgba(201,168,76,.35);
  color: var(--gold-lt); font-family: var(--sans); font-size: .6rem;
  letter-spacing: .22em; text-transform: uppercase;
  padding: .72rem 1.8rem; z-index: 600;
  opacity: 0; transition: opacity .4s, transform .4s var(--ease);
  pointer-events: none; white-space: nowrap; backdrop-filter: blur(8px);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── PARTICLES ──────────────────────────────── */
.sp {
  position: fixed; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,.52), transparent 65%);
  pointer-events: none; z-index: 5; animation: rise linear infinite; opacity: 0;
}
@keyframes rise {
  0% { opacity:0; transform:translateY(0) scale(.4); }
  15% { opacity:.32; } 85% { opacity:.1; }
  100% { opacity:0; transform:translateY(-65vh) scale(1.5); }
}

/* ── MOBILE ─────────────────────────────────── */
@media (max-width: 600px) {
  .page { padding: 3.5rem 1.1rem 4.5rem; justify-content: flex-start; padding-top: 5rem; }
  #page-reveal { padding-top: 4rem; }
  .design-1, .design-2, .design-3 { transform: none !important; }
  .c-msg-wrap { max-width: 100%; }
  .reveal-actions { flex-direction: column; align-items: stretch; }
  .reveal-actions .btn-primary, .reveal-actions .btn-secondary { align-self: stretch; text-align: center; padding: 1.1rem; }
  .btn-primary { align-self: stretch; text-align: center; }
  .passport { width: 56px; height: 70px; top: 16px; right: 16px; }
}
@media (max-width: 380px) {
  .c-title { font-size: 1.9rem; }
  .c-name  { font-size: 1.5rem; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="ld-logo">Maison Éclat</div>
  <div class="ld-line"></div>
</div>

<!-- VIDEO BG -->
<div id="bg-wrap">
  <video id="bg-video" autoplay muted loop playsinline preload="none">
    <!-- <source src="luxury-bg.mp4" type="video/mp4" /> -->
  </video>
</div>

<!-- PARTICLES -->
<div id="particles"></div>
<!-- TOAST -->
<div id="toast"></div>


<!-- ════════════════════════════════════════════
     PAGE 1 — LANDING
════════════════════════════════════════════ -->
<section id="page-landing" class="page">
  <div class="atelier-label" id="lbl-atelier">Birthday Atelier</div>
  <div class="logo-mark">Maison Éclat</div>
  <div class="logo-rule"></div>
  <h1 class="main-title"><em id="title-em">Birthday</em> Atelier</h1>
  <p class="subtitle" id="subtitle">Craft a timeless birthday experience</p>

  <form class="form-wrap" id="form" novalidate>
    <div class="field">
      <label id="lbl-photo">Celebrant's Photo <span style="opacity:.45;font-size:.85em">(optional)</span></label>
      <label class="upload-field" for="input-photo">
        <span class="upload-icon">🖼</span>
        <span class="upload-text" id="upload-text">Upload a photo</span>
        <img class="upload-preview" id="upload-preview" alt="" />
        <input type="file" id="input-photo" accept="image/*" />
      </label>
    </div>
    <div class="field">
      <label id="lbl-celebrant">Celebrant's Name</label>
      <input type="text" id="input-celebrant" autocomplete="off" placeholder="e.g. Isabelle" required />
    </div>
    <div class="field">
      <label id="lbl-from">Your Name</label>
      <input type="text" id="input-from" autocomplete="off" placeholder="e.g. Julien" required />
    </div>
    <div class="field">
      <label id="lbl-message">Your Message</label>
      <textarea id="input-message" placeholder="Write something heartfelt…" required></textarea>
    </div>
    <button type="submit" class="btn-primary" id="btn-create">Create the Moment</button>
  </form>
</section>


<!-- ════════════════════════════════════════════
     PAGE 2 — REVEAL
════════════════════════════════════════════ -->
<section id="page-reveal" class="page">

  <!-- Card is injected by JS -->
  <div class="card-wrap" id="card-wrap"></div>

  <div class="reveal-actions">
    <button class="btn-primary" id="btn-share">Share this Moment 💫</button>
    <button class="btn-secondary" id="btn-back">← Create Another</button>
  </div>
</section>


<!-- ════════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════ -->
<script>
/* ── Language ──────────────────────────────────────── */
const lang = navigator.language?.startsWith('fr') ? 'fr' : 'en';
const T = {
  en: {
    atelierLabel:'Birthday Atelier', titleEm:'Birthday',
    subtitle:'Craft a timeless birthday experience',
    lblPhoto:"Celebrant's Photo", uploadText:'Upload a photo', uploadDone:'Photo selected ✓',
    lblCelebrant:"Celebrant's Name", lblFrom:'Your Name', lblMessage:'Your Message',
    pCel:'e.g. Isabelle', pFrom:'e.g. Julien', pMsg:'Write something heartfelt…',
    btnCreate:'Create the Moment', btnShare:'Share this Moment 💫', btnBack:'← Create Another',
    hbEyebrow:'Happy Birthday',
    hbTitle:'Happy Birthday',
    presented:'Presented to',
    tagline:'For celebrating another beautiful year of life,\nand for being truly exceptional.',
    sigLabel:'Presented by',
    shareMsg:'I created something truly special for you 💖',
    toastOpen:'Opening WhatsApp…',
    errorFill:'Please fill in all fields',
    watermark:'Maison Éclat — Birthday Atelier',
  },
  fr: {
    atelierLabel:"Atelier d'Anniversaire", titleEm:'Anniversaire',
    subtitle:"Créez une expérience d'anniversaire inoubliable",
    lblPhoto:'Photo du Festoyé(e)', uploadText:'Télécharger une photo', uploadDone:'Photo sélectionnée ✓',
    lblCelebrant:'Nom du Festoyé(e)', lblFrom:'Votre Nom', lblMessage:'Votre Message',
    pCel:'ex. Isabelle', pFrom:'ex. Julien', pMsg:'Écrivez quelque chose du fond du cœur…',
    btnCreate:'Créer le moment', btnShare:'Partager ce moment 💫', btnBack:'← Créer un autre',
    hbEyebrow:'Joyeux Anniversaire',
    hbTitle:'Joyeux Anniversaire',
    presented:'Présenté à',
    tagline:"Pour célébrer une nouvelle et belle année de vie,\net pour être véritablement exceptionnel(le).",
    sigLabel:'Présenté par',
    shareMsg:"J'ai créé quelque chose de vraiment spécial pour toi 💖",
    toastOpen:'Ouverture de WhatsApp…',
    errorFill:'Veuillez remplir tous les champs',
    watermark:"Maison Éclat — Atelier d'Anniversaire",
  }
};
const t = T[lang];

/* ── Apply landing translations ─────────────────────── */
document.title = 'CARDTO';
const $ = id => document.getElementById(id);
$('lbl-atelier').textContent = t.atelierLabel;
$('title-em').textContent    = t.titleEm;
$('subtitle').textContent    = t.subtitle;
$('lbl-photo').childNodes[0].textContent = t.lblPhoto + ' ';
$('upload-text').textContent    = t.uploadText;
$('lbl-celebrant').textContent  = t.lblCelebrant;
$('lbl-from').textContent       = t.lblFrom;
$('lbl-message').textContent    = t.lblMessage;
$('input-celebrant').placeholder = t.pCel;
$('input-from').placeholder      = t.pFrom;
$('input-message').placeholder   = t.pMsg;
$('btn-create').textContent  = t.btnCreate;
$('btn-share').textContent   = t.btnShare;
$('btn-back').textContent    = t.btnBack;

/* ── Design rotation counter ───────────────────────── */
let designCounter = 0; // increments each generation, cycles 0→1→2

/* ── Card builders ─────────────────────────────────── */
function makePassport(photoUrl) {
  if (!photoUrl) return '';
  return `<div class="passport visible" id="passport">
    <img src="${photoUrl}" alt="Celebrant" />
  </div>`;
}

function makeCommonContent(name, message, from, photoUrl) {
  const taglineHtml = t.tagline.split('\n').join('<br/>');
  return `
    ${makePassport(photoUrl)}
    <div class="c-eyebrow">${t.hbEyebrow}</div>
    <div class="c-title">${t.hbTitle}</div>
    <div class="c-rule-row"><span></span><div class="c-diamond"></div><span></span></div>
    <div class="c-presented">${t.presented}</div>
    <div class="c-name">${name}</div>
    <div class="c-tagline" style="margin:.4rem 0 1.3rem">${taglineHtml}</div>
    <div class="c-msg-wrap">
      <span class="c-msg-q">"</span>
      <p class="c-msg">${message}</p>
    </div>
    <div class="c-rule-row" style="margin-top:1.2rem"><span></span><div class="c-diamond"></div><span></span></div>
    <div class="c-sig-label">${t.sigLabel}</div>
    <div class="c-sig">${from}</div>
    <div class="c-seal"></div>
    <div class="c-watermark">${t.watermark}</div>
  `;
}

function buildDesign1(name, message, from, photoUrl) {
  // Confetti dots
  const dotColors = ['#c9a84c','#e8d5a3','#fff','#f0d060'];
  let dots = '';
  for (let i = 0; i < 22; i++) {
    const size = 2 + Math.random() * 3;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const delay = Math.random() * 3;
    const color = dotColors[Math.floor(Math.random()*dotColors.length)];
    dots += `<div class="d1-dot" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;background:${color};animation-delay:${delay}s"></div>`;
  }

  return `<div class="design-1" id="active-card">
    <div class="d1-confetti">${dots}</div>
    <div class="d1-bar-l"></div>
    <div class="d1-bar-r"></div>
    <div class="d1-frame"></div>
    <div class="d1-shield-tl">
      <svg viewBox="0 0 44 44" fill="none">
        <path d="M2 40V9C2 5.13 5.13 2 9 2H42" stroke="#c9a84c" stroke-width="1.2" opacity=".6"/>
        <path d="M2 22V2H22" stroke="#c9a84c" stroke-width=".6" opacity=".3"/>
        <circle cx="4" cy="4" r="2" fill="#c9a84c" opacity=".4"/>
      </svg>
    </div>
    <div class="d1-shield-tr">
      <svg viewBox="0 0 44 44" fill="none">
        <path d="M2 40V9C2 5.13 5.13 2 9 2H42" stroke="#c9a84c" stroke-width="1.2" opacity=".6"/>
        <path d="M2 22V2H22" stroke="#c9a84c" stroke-width=".6" opacity=".3"/>
        <circle cx="4" cy="4" r="2" fill="#c9a84c" opacity=".4"/>
      </svg>
    </div>
    ${makeCommonContent(name, message, from, photoUrl)}
  </div>`;
}

function buildDesign2(name, message, from, photoUrl) {
  return `<div class="design-2" id="active-card">
    <div class="d2-stripe"></div>
    <div class="d2-wave-tl"></div>
    <div class="d2-wave-tl2"></div>
    <div class="d2-wave-br"></div>
    <div class="d2-wave-br2"></div>
    ${makeCommonContent(name, message, from, photoUrl)}
  </div>`;
}

function buildDesign3(name, message, from, photoUrl) {
  const stars = ['★','✦','✧','⭐'];
  const positions = [
    [8,6],[92,8],[5,85],[93,88],[15,45],[85,50],[50,5],[50,92],[30,15],[70,18]
  ];
  let starHtml = '';
  positions.forEach(([x, y], i) => {
    const s = stars[i % stars.length];
    const delay = (i * 0.3).toFixed(1);
    const size  = 0.65 + Math.random() * 0.5;
    starHtml += `<div class="d3-star" style="left:${x}%;top:${y}%;font-size:${size}rem;animation-delay:${delay}s">${s}</div>`;
  });

  return `<div class="design-3" id="active-card">
    <div class="d3-top-burst"></div>
    <div class="d3-arc"></div>
    <div class="d3-hline" style="top:28px"></div>
    <div class="d3-hline" style="bottom:28px"></div>
    <div class="d3-circle" style="width:120px;height:120px;top:-50px;left:-50px;"></div>
    <div class="d3-circle" style="width:90px;height:90px;bottom:-40px;right:-40px;"></div>
    ${starHtml}
    ${makeCommonContent(name, message, from, photoUrl)}
  </div>`;
}

/* ── Pages ──────────────────────────────────────────── */
const pageLanding = $('page-landing');
const pageReveal  = $('page-reveal');

function showPage(el) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.classList.add('exit');
    setTimeout(() => p.classList.remove('exit'), 900);
  });
  setTimeout(() => el.classList.add('active'), 80);
}

/* ── Loading ─────────────────────────────────────────── */
window.addEventListener('load', () => {
  const ol = $('loading');
  setTimeout(() => {
    ol.classList.add('hidden');
    setTimeout(() => { ol.style.display = 'none'; showPage(pageLanding); }, 950);
  }, 1500);
});

/* ── Particles ──────────────────────────────────────── */
(function() {
  const c = $('particles');
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'sp';
    const s = 2 + Math.random() * 4;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}vw;bottom:${-8+Math.random()*8}vh;animation-duration:${10+Math.random()*20}s;animation-delay:${Math.random()*14}s;`;
    c.appendChild(p);
  }
})();

/* ── Photo upload ───────────────────────────────────── */
let uploadedDataUrl = null;

$('input-photo').addEventListener('change', function() {
  const file = this.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    uploadedDataUrl = e.target.result;
    $('upload-preview').src = uploadedDataUrl;
    $('upload-preview').classList.add('visible');
    $('upload-text').textContent = t.uploadDone;
  };
  reader.readAsDataURL(file);
});

/* ── Form submit ────────────────────────────────────── */
$('form').addEventListener('submit', function(e) {
  e.preventDefault();
  const celebrant = $('input-celebrant').value.trim();
  const from      = $('input-from').value.trim();
  const message   = $('input-message').value.trim();
  if (!celebrant || !from || !message) { showToast(t.errorFill); return; }

  /* pick design based on counter (0→1→2→0→...) */
  const design = designCounter % 3;
  designCounter++;

  let html;
  if (design === 0) html = buildDesign1(celebrant, message, from, uploadedDataUrl);
  else if (design === 1) html = buildDesign2(celebrant, message, from, uploadedDataUrl);
  else html = buildDesign3(celebrant, message, from, uploadedDataUrl);

  $('card-wrap').innerHTML = html;

  /* tilt on mousemove after injection */
  setupTilt();

  showPage(pageReveal);
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

/* ── Tilt ───────────────────────────────────────────── */
function setupTilt() {
  const card = $('active-card');
  if (!card) return;
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseleave', onMouseLeave);
}
function onMouseMove(e) {
  if (window.innerWidth < 600 || !pageReveal.classList.contains('active')) return;
  const card = $('active-card'); if (!card) return;
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
  card.style.transform = `perspective(1000px) rotateX(${-dy*2.5}deg) rotateY(${dx*2.5}deg)`;
}
function onMouseLeave() {
  const card = $('active-card'); if (!card) return;
  card.style.transform = 'perspective(1000px) rotateX(1deg) rotateY(0deg)';
}

/* ── Back ───────────────────────────────────────────── */
$('btn-back').addEventListener('click', () => {
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseleave', onMouseLeave);
  showPage(pageLanding);
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

/* ── Share ──────────────────────────────────────────── */
$('btn-share').addEventListener('click', async () => {
  showToast(t.toastOpen);
  const card = $('active-card');
  if (!card) return;
  try {
    const canvas = await html2canvas(card, {
      backgroundColor: '#0d0900',
      scale: 2, useCORS: true, allowTaint: true, logging: false,
    });
    canvas.toBlob(async blob => {
      const file = new File([blob], 'cardto-birthday.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ title: 'CARDTO', text: t.shareMsg, files: [file] }); return; }
        catch(_) {}
      }
      window.open(`https://wa.me/?text=${encodeURIComponent(t.shareMsg + '\n\n' + window.location.href)}`, '_blank');
    }, 'image/png');
  } catch(_) {
    window.open(`https://wa.me/?text=${encodeURIComponent(t.shareMsg)}`, '_blank');
  }
});

/* ── Toast ──────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const el = $('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
</body>
</html>
